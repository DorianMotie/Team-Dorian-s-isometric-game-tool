<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ZIM - Tile Map Prototype</title>

<!-- zimjs.com - JavaScript Canvas Framework -->
<script type="module">

import "https://zimjs.org/cdn/019/zim";
import "https://zimjs.org/cdn/019/zim_game";
import "https://zimjs.org/cdn/019/zim_pizzazz";

const assets = [
	"landscapeTiles_sheet.png",
	"landscapeTiles_sheet.xml",
	"gf_Bitcount Grid Double",
	"watercolor.jpg"
];
const path = "assets/";

new Frame(FIT, 1024, 768, light, dark, ready, assets, path);
function ready() {

	// Background
	new Pic("watercolor.jpg")
		.scaleTo()
		.center()
		.alp(.4)
		.noMouse();

	const bar = new Rectangle(W,40,black).addTo();
	F.makeIcon({box:black}).scaleTo(bar,80,80).loc(10,3);
	new Label("Isometric Grid Game Tool", 50, "Bitcount Grid Double", yellow).pos(0,3,CENTER,CENTER,bar);

	const options = {
		"BOARD SIZE": ["1x1", "2x2", "3x3", "4x4", "5x5"]
	};
	const boardSize = new List({
		list: {
			menu:options, 
			shade: true,
			dim: true,
			shift: true,
			bloom: true,
			whither: true,
			subStyles: [
      {
         backgroundColor: red,
         color: white,
         rollBackgroundColor: purple,
         rollColor: white,
         selectedBackgroundColor: white,
         selectedColor: red,
         selectedRollBackgroundColor: purple,
         selectedRollColor: white
      }, {
         backgroundColor: blue,
         color: white,
         rollBackgroundColor: pink,
         rollColor: white,
         selectedBackgroundColor: black,
         selectedColor: white,
         selectedRollBackgroundColor: pink,
         selectedRollColor: white
      }, {
         backgroundColor: green,
         color: white,
         rollBackgroundColor: brown,
         rollColor: white,
         selectedBackgroundColor: black,
         selectedColor: white,
         selectedRollBackgroundColor: white,
         selectedRollColor: black
      }
   ]
		},
		pulldown:true,
		pulldownToggle:true,
		currentSelected:false,
		width:200,
		shadowBlur:-1
	})
		.loc(20,155);

	// Tiled Board
	// const board = new Tile(new Rectangle(100,100,purple,null,null,10).reg(CENTER), 5,5,5,5).center().mov(0,40);

	let board;
	let c;
	let list;
	let garbage;

	function makeBoard(cols, rows) {
		if (board) board.removeFrom();
		if (c) c.removeAllChildren();

		board = new Board({
			size:65,
			cols:cols,
			rows:rows
		})
			.center()
			.mov(0,120);

		if (c) {
			c.dropTargets = copy(board.tiles.items);
			c.dropTargets.push(garbage);
			c.top();
		}

		if (list) {
			list.dropTargets = board.tiles.items;
			list.updateDrop();
		}
		
		S.update();
	}

	makeBoard(5, 5);

	boardSize.on("change", () => {
		const selected = boardSize.value;
		const parts = selected.split("x");
		const cols = Number(parts[0]);
		const rows = Number(parts[1]);

		makeBoard(cols, rows);
	});

	 garbage = makeIcon("garbage",purple).reg(CENTER).sca(1.5).pos(20,20,RIGHT,BOT);
	
	// List of draggable items
	c = new Container(W,H).addTo().drag({
		dropTargets:copy(board.tiles.items),
		dropHitTest:"reg",
		dropEnd:false,
		dropWidth:100 
	});
	c.on("mousedown", (e)=>{
		c.top();		
	});
	c.on("pressup", (e)=>{
		if (e.target.dropTarget == garbage) {
			garbage.dropFull = false;
			e.target.dispose();
			S.update()
		} else if (e.target.dropTarget) {
			if (e.target.tile) e.target.tile.item = null;
			e.target.tile = e.target.dropTarget;
		}
	});
	c.dropTargets.push(garbage);

	const items = [];
	loop(4*32, i=>{
		const box = new Container(100,100).reg(CENTER);
		new Rectangle(100,100,white,darker,2,10).addTo(box);

		const sprite = new Sprite("landscapeTiles_sheet.png", 4, 32).siz(null,100).run({frame:i}).center(box);

		box.frame = i;
		box.mouseChildren = false;
		items.push(box);
	});

	list = new List({
		backdropColor:white,
		paddingH:5,
		valign:TOP,
		indent:2,
		width:W,
		height:100,
		viewNum:12.5,
		list:items,
		dropCopy:true,
		vertical:false,
		dropWidth:100,
		dropTargets:board.tiles.items,
		dropHitTest:"reg",
		dropEnd:false
	}).loc(0,40);

	list.on("dropdown", ()=>{
		const frame = list.items[list.dropIndex].content.frame;

		// clear the copied preview box
		list.dropItem.removeAllChildren();

		// a copy for drag and drop
		const sprite = new Sprite("landscapeTiles_sheet.png", 4, 32)
			.run({frame: frame})
			.addTo(list.dropItem);

		// item scaling
		sprite.sca(1.37);

		sprite.centerReg(list.dropItem);

		list.dropItem.frame = frame;
		list.dropItem.mouseChildren = false;
	})	

	// if we want to drag and drop after taking out of List then add it to the container c 
	// but careful only to add it if we drop on one of the targets of c
	list.on("dropup", ()=>{	
		if (list.dropTarget) { 
			list.dropItem.addTo(c);	
			list.dropItem.tile = list.dropTarget; // store which tile item was dropped on
			const b = list.dropItem.getBounds();
			list.dropItem.reg(b.width / 2, b.height / 1.4);
		}
	});

	// Clear Button
	const clear = new Button({
		label:"CLEAR",
		wait:"CONFIRM", 
		waitBackgroundColor:yellow,
		waitColor:black,
		rollWaitBackgroundColor:yellow,
		rollWaitColor:black,
		downColor:black
	})
	clear.on("mousedown", ()=>{
		if (clear.waiting) {
			// Clear item references from dropped objects
			c.loop(child => {
				if (child.tile) {
					child.tile.dropFull = false;
					child.tile.item = null;
					child.tile = null;
				}
			});

			// Reset every tile on the board
			loop(board.tiles.items, tile => {
				tile.dropFull = false;
				tile.item = null;
			});

			c.removeAllChildren();
			clear.clearWait();
			S.update();
		}
	});

	// Save Button
	const textArea = new TextArea({width:400, height:400, borderColor:white, borderWidth:5});
	const pane = new Pane({width:500, height:500, content:textArea, close:true});
	textArea.mov(0,-20)
	const copyBut = new Button({label:"COPY"})
		.sca(.5)
		.pos(0,20,CENTER,BOTTOM,pane.contentContainer)
		.tap(()=>{
			copyTextToClipboard(textArea.text);
			textArea.background.borderColor = green;
			S.update()
			timeout(.5,()=>{
				textArea.background.borderColor = white;
				S.update()
			});			
		});
	
	const save = new Button({label:"SAVE"}).tap(()=>{
		const data = {};
		c.loop(item=>{
			// could also get tileCol and tileRow if needed
			// will want to match data of game Board()
			if (item.tile) data["tile_"+item.tile.tileNum] = "frame_"+item.frame;
		})
		// zogr(JSON.stringify(data));
		textArea.text = JSON.stringify(data)
		pane.show();
		
	})

	// Buttons
	new Tile([clear, save], 3, 1, 40, 0, true).sca(.5).pos(30,25,LEFT,BOT);

	// CLIPBOARD CODE
	async function copyTextToClipboard(text) {
		try {
			await navigator.clipboard.writeText(text);			
		} catch (err) {
			fallbackCopyTextToClipboard(text);
		}
	}
	function fallbackCopyTextToClipboard(codeText) {
		const ta = document.createElement('textarea');
		ta.value = codeText;

		// Make the textarea non-visible but part of the DOM
		ta.style.position = 'fixed';
		ta.style.top = 0;
		ta.style.left = 0;
		ta.style.width = '1px';
		ta.style.height = '1px';
		ta.style.padding = 0;
		ta.style.border = 'none';
		ta.style.outline = 'none';
		ta.style.boxShadow = 'none';
		ta.style.background = 'transparent';

		document.body.appendChild(ta);
		ta.select();

		// For iOS, you may need to adjust selection range manually
		ta.setSelectionRange(0, 999999); /* For mobile devices */

		try {
			var successful = document.execCommand('copy');
		} catch (err) {
			console.error('could not copy', err);
		}

		document.body.removeChild(ta);
	}
	// END CLIPBOARD CODE
}

</script>
<meta name="viewport" content="width=device-width" />
</head>
<body></body>
</html>
